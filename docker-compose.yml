services:
  postgres:
    image: postgres:16-alpine
    container_name: doms-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: doms
      POSTGRES_PASSWORD: doms
      POSTGRES_DB: doms
    ports:
      - "5432:5432"
    volumes:
      - doms_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U doms"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  doms_pgdata:
