    <text x="179" y="552" text-anchor="middle">Logistics</text>
    <rect x="270" y="520" width="130" height="50" rx="25" fill="#CDEFDB"/>
    <text x="335" y="552" text-anchor="middle">Safety</text>
    <rect x="416" y="520" width="160" height="50" rx="25" fill="#CDEFDB"/>
    <text x="496" y="552" text-anchor="middle">Dispatch</text>
    <rect x="592" y="520" width="110" height="50" rx="25" fill="#CDEFDB"/>
