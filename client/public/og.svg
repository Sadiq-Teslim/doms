<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="page" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F6043"/>
      <stop offset="1" stop-color="#06311F"/>
    </linearGradient>
    <linearGradient id="mark" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1AA260"/>
      <stop offset="1" stop-color="#0B4D34"/>
    </linearGradient>
    <pattern id="dots" width="34" height="34" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="2" fill="#ffffff" fill-opacity="0.05"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="url(#page)"/>
  <rect width="1200" height="630" fill="url(#dots)"/>
  <circle cx="1080" cy="120" r="240" fill="#1AA260" fill-opacity="0.18"/>
  <circle cx="1140" cy="560" r="180" fill="#F4B740" fill-opacity="0.12"/>

  <!-- logo mark -->
  <g transform="translate(100,120) scale(2.2)">
    <rect width="64" height="64" rx="15" fill="url(#mark)"/>
    <g stroke="#F4B740" stroke-width="2.4" stroke-linecap="round">
      <path d="M5 25h7"/><path d="M4 30.5h6"/><path d="M6 36h6"/>
    </g>
    <rect x="13" y="21" width="24" height="15" rx="2.6" fill="#ffffff"/>
    <path d="M37 36V27h7l6 5v4z" fill="#ffffff"/>
    <rect x="40" y="29" width="3.4" height="3" rx="0.6" fill="#0B4D34"/>
    <circle cx="21" cy="38" r="4.2" fill="#ffffff"/>
    <circle cx="44" cy="38" r="4.2" fill="#ffffff"/>
    <circle cx="21" cy="38" r="1.9" fill="#0B4D34"/>
    <circle cx="44" cy="38" r="1.9" fill="#0B4D34"/>
  </g>

  <text x="262" y="205" font-family="Segoe UI, Arial, sans-serif" font-size="92" font-weight="700" fill="#ffffff" letter-spacing="-1">DOMS</text>

  <text x="102" y="330" font-family="Segoe UI, Arial, sans-serif" font-size="52" font-weight="700" fill="#ffffff">Depot Operations Management</text>
  <text x="102" y="398" font-family="Segoe UI, Arial, sans-serif" font-size="52" font-weight="700" fill="#ffffff">System</text>

  <text x="104" y="470" font-family="Segoe UI, Arial, sans-serif" font-size="30" fill="#9FE0BB">From loading bay to gate &#8212; one connected workflow.</text>

  <g font-family="Segoe UI, Arial, sans-serif" font-size="26" font-weight="600" fill="#0B4D34">
